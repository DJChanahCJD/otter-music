name: Release Mobile (Android Only)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: 20

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*-release*.apk
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Prepare release notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="public/release/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_body.md
          else
            {
              echo "# Otter Music ${TAG}"
              echo ""
              echo "Android 自动化构建发布。"
              echo ""
              echo "### 更新内容"
              echo "- 构建版本: ${TAG}"
              echo "- 发布日期: $(date +'%Y-%m-%d')"
            } > release_body.md
          fi

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_body.md
          files: |
            dist/android/*.apk
          fail_on_unmatched_files: true